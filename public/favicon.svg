<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cbf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b49ee8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" opacity="0.1"/>

  <!-- Dollar sign -->
  <g transform="translate(35, 30)">
    <path d="M 15 2 L 15 28 M 12 8 Q 8 8 8 12 Q 8 16 12 16 L 18 16 Q 22 16 22 20 Q 22 24 18 24 L 12 24"
          stroke="#7c5cbf" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Chart/bars -->
  <g transform="translate(50, 20)">
    <!-- Bar 1 (ascending) -->
    <rect x="0" y="12" width="4" height="8" fill="#7c5cbf" rx="1"/>
    <!-- Bar 2 -->
    <rect x="6" y="8" width="4" height="12" fill="#b49ee8" rx="1"/>
    <!-- Bar 3 -->
    <rect x="12" y="4" width="4" height="16" fill="#7c5cbf" rx="1"/>
    <!-- Bar 4 -->
    <rect x="18" y="0" width="4" height="20" fill="#b49ee8" rx="1"/>
  </g>

  <!-- Percentage symbol -->
  <g transform="translate(60, 50)" opacity="0.8">
    <circle cx="2" cy="2" r="1.5" fill="#7c5cbf"/>
    <path d="M 8 0 L 0 8" stroke="#7c5cbf" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="8" r="1.5" fill="#7c5cbf"/>
  </g>
</svg>
